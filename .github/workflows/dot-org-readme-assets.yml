name: Plugin asset/readme update
on:
  push:
    tags:
    - readme
    - assets
jobs:
  main:
    name: Tagged push from main
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Ensure tag commit is on main
      id: guard
      shell: bash
      run: |
        # Fetch the main branch so its history is fully available
        git fetch origin main

        # Get the actual commit hash of the tag that triggered the run
        TAG_COMMIT=$(git rev-parse "$GITHUB_SHA")

        # Check if that commit is part of the main branch history
        if git branch -r --contains "$TAG_COMMIT" | grep -q "origin/main"; then
          echo "run_update=true" >> "$GITHUB_OUTPUT"
        else
          echo "run_update=false" >> "$GITHUB_OUTPUT"
          echo "Tag commit is not on main. Skipping asset/readme update."
        fi
    - name: WordPress.org plugin asset/readme update
      if: steps.guard.outputs.run_update == 'true'
      uses: 10up/action-wordpress-plugin-asset-update@stable
      env:
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
